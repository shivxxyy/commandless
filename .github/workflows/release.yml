name: Release

# Build signed-less macOS + Windows installers and publish a GitHub Release
# when a version tag (e.g. v0.1.0) is pushed.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The hosted proxy URL + app token are baked into the build so the
          # shipped app talks to your deployed proxy. Set these as repo secrets.
          VITE_AI_PROXY_URL: ${{ secrets.VITE_AI_PROXY_URL }}
          VITE_APP_TOKEN: ${{ secrets.VITE_APP_TOKEN }}
          # Analytics (optional — leave unset to ship without analytics).
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "CommandLess ${{ github.ref_name }}"
          releaseBody: |
            Download the installer for your platform below.

            - macOS: `.dmg` (universal — Apple Silicon + Intel)
            - Windows: `.msi` / `.exe`

            This build is unsigned. macOS: right-click the app → Open the first
            time. Windows: "More info" → "Run anyway" on the SmartScreen prompt.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
